[studio]
location = Locatie en ruimtenummer

[interface]
always_on_top = false
app_offset_x = 1920
app_offset_y = 0
gui_rec_buttons_enabled = false
teleprompter_offset_x = 0
teleprompter_offset_y = -1080

[features]
cloud_storage = off
email_logs = off
mic_check = off
powerpoint = off
streamdeck = off
telemetry = off
ultimatte = off

[cloud_storage]
provider = OneDrive
client_id = client_id
tenant_id = tenant_id
login_timeout = 150

[presentation]
app = PowerPoint

[recorder]
app = OBS
args = --portable
password = password
profile = Profile_v1
projector = off
projector_monitor = 0
scene_collection = SceneCollection_v1

[browser]
name = Mozilla Firefox
args = --kiosk
close_at_logout = false

[logo]
file_name = logo.png
width = 595
height = 240

[paths]
assets_dir = D:\studio-mediafiles\_assets\
backup_dir = D:\studio-mediafiles\_backup\
browser_path = C:\Program Files\Mozilla Firefox\firefox.exe
download_dir = D:\studio-mediafiles\_download\
ffmpeg_path = C:\Software\ffmpeg
recorder_path = C:\Program Files\obs-studio\bin\64bit\obs64.exe
public_key_path = D:\studio-mediafiles\_keys\public_key.pem
private_key_path = E:\private_key.pem
record_dir = D:\studio-mediafiles\
stats_file = stats.csv

[ip]
localhost = 127.0.0.1
ultimatte = 192.168.10.220
webhost = https://www.yourhosting.com/

[port]
streamdeck = 4468
ultimatte = 9998

[mic]
device_index = 1
sample_rate = 48000
channels = 1
init_threshold = 0.05
block_duration = 0.05
blocks_top_threshold_reset = 15
blocks_bot_threshold_reset = 120
max_length_of_tap = 1.00

[backup]
duration_in_days = 7

[keybindings]
toggle_debug = F1
send_log = F2
toggle_greenscreen = F5
reboot_obs = F12

[colors]
primary = #ffcd00
secondary = #001240
bg_content = #e8e8e8
good = #00ff12
menu_btn_fg_normal = #ffffff
menu_btn_txt_normal = #000000
menu_btn_txt_active = #ffffff
menu_btn_txt_locked = #666666
page_btn_fg_normal = #ffffff
page_btn_fg_locked = #cccccc
page_btn_txt_normal = #000000
page_btn_txt_locked = #666666
page_txt_1 = #000000
page_txt_2 = #ffffff
